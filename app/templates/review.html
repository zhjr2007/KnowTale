{% extends "base.html" %}
{% block title %}知识点抽背{% endblock %}
{% block content %}
<div class="mb-3">
    <a href="/courses/{{ course_id }}" class="text-decoration-none text-muted small">
        <i class="bi bi-arrow-left me-1"></i>返回课程
    </a>
</div>

<h5 class="fw-bold mb-3"><i class="bi bi-shuffle me-2"></i>知识点抽背</h5>

<div id="review-card" class="card shadow-sm border-0 mb-3">
    <div class="card-body text-center py-5">
        <div class="spinner-border spinner-border-sm text-primary mb-3"></div>
        <p class="text-muted">准备题目...</p>
    </div>
</div>

<div id="review-actions" class="d-none">
    <form id="answer-form" class="mb-3">
        <textarea id="student-answer" class="form-control mb-2" rows="3" placeholder="输入你的答案..."></textarea>
        <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-check me-1"></i>核对答案
        </button>
    </form>
</div>

<div id="review-feedback" class="d-none"></div>

<div class="d-flex gap-2 mt-3">
    <button id="next-btn" class="btn btn-outline-primary flex-fill d-none" onclick="nextQuestion()">
        <i class="bi bi-arrow-right me-1"></i>下一题
    </button>
    <button id="reveal-btn" class="btn btn-outline-secondary flex-fill d-none" onclick="revealAnswer()">
        <i class="bi bi-eye me-1"></i>看答案
    </button>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
let used = [];
let currentQuestion = '';
let currentAnswer = '';
let currentPoint = '';

async function nextQuestion() {
    document.getElementById('review-card').innerHTML = '<div class="card-body text-center py-5"><div class="spinner-border spinner-border-sm text-primary mb-3"></div><p class="text-muted">加载中...</p></div>';
    document.getElementById('review-actions').classList.add('d-none');
    document.getElementById('review-feedback').classList.add('d-none');
    document.getElementById('next-btn').classList.add('d-none');
    document.getElementById('reveal-btn').classList.add('d-none');

    try {
        const resp = await fetch(`/api/review/question/{{ course_id }}?skip=${used.join(',')}`);
        if (!resp.ok) {
            document.getElementById('review-card').innerHTML = '<div class="card-body text-center py-5 text-success"><i class="bi bi-trophy" style="font-size:2rem"></i><p class="mt-2">所有知识点已复习完毕！</p></div>';
            return;
        }
        const data = await resp.json();
        currentQuestion = data.question;
        currentPoint = data.knowledge_point;
        used.push(currentPoint);

        document.getElementById('review-card').innerHTML = `
            <div class="card-body">
                <span class="badge bg-light text-primary mb-2">${currentPoint}</span>
                <h5 class="fw-bold mt-2">${currentQuestion}</h5>
                <textarea id="student-answer" class="form-control mt-3" rows="3" placeholder="输入你的答案..."></textarea>
            </div>
        `;
        document.getElementById('review-actions').classList.remove('d-none');
        currentAnswer = '';
        await fetchAnswer(currentPoint);
    } catch (e) {
        document.getElementById('review-card').innerHTML = '<div class="alert alert-danger">加载失败</div>';
    }
}

async function fetchAnswer(point) {
    const resp = await fetch(`/api/review/question/{{ course_id }}?skip=${used.join(',')}&need_answer=1`);
    if (resp.ok) {
        const data = await resp.json();
        currentAnswer = data.correct_answer || data.answer || '';
    }
}

document.getElementById('answer-form')?.addEventListener('submit', async function(e) {
    e.preventDefault();
    const studentAns = document.getElementById('student-answer').value.trim();
    if (!studentAns) return;

    const btn = this.querySelector('button');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>批改中...';

    try {
        const resp = await fetch('/api/review/check', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ question: currentQuestion, correct_answer: currentAnswer, student_answer: studentAns })
        });
        const result = await resp.json();
        const fb = document.getElementById('review-feedback');
        fb.classList.remove('d-none');
        if (result.is_correct) {
            fb.innerHTML = `<div class="alert alert-success">✅ 正确！${result.feedback || ''}</div>`;
        } else {
            fb.innerHTML = `<div class="alert alert-danger">❌ 还需努力<br><strong>正确答案：</strong>${result.correct_answer}<br>${result.feedback || ''}</div>`;
        }
        document.getElementById('next-btn').classList.remove('d-none');
        document.getElementById('reveal-btn').classList.add('d-none');
    } catch (e) {
        alert('网络错误');
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-check me-1"></i>核对答案';
});

function revealAnswer() {
    const fb = document.getElementById('review-feedback');
    fb.classList.remove('d-none');
    fb.innerHTML = `<div class="alert alert-info"><strong>参考答案：</strong>${currentAnswer || '请参考教材'}</div>`;
    document.getElementById('next-btn').classList.remove('d-none');
    document.getElementById('reveal-btn').classList.add('d-none');
}

document.addEventListener('DOMContentLoaded', nextQuestion);
</script>
{% endblock %}
