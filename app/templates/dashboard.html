{% extends "base.html" %}
{% block title %}我的课程{% endblock %}
{% block content %}

{% if user.role == 'teacher' %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">
        <i class="bi bi-grid-fill me-2"></i>我的课程
    </h4>
    <div>
        <button class="btn btn-outline-secondary me-2" id="show-archived-btn" onclick="toggleArchived()">
            <i class="bi bi-archive me-1"></i>已归档
        </button>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createCourseModal">
            <i class="bi bi-plus-lg me-1"></i>创建课程
        </button>
    </div>
</div>
{% else %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">
        <i class="bi bi-journal-text me-2"></i>已加入课程
    </h4>
</div>
{% endif %}

<div id="course-section-active">
    <div class="row g-4" id="course-list"></div>
</div>

<div id="course-section-archived" class="d-none">
    <h5 class="text-muted mb-3"><i class="bi bi-archive me-2"></i>已归档课程</h5>
    <div class="row g-4" id="archived-course-list"></div>
</div>

{% if user.role == 'teacher' %}
<div class="modal fade" id="createCourseModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">创建课程</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="create-alert"></div>
                <form id="create-course-form">
                    <div class="mb-3">
                        <label class="form-label">课程名称</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">课程描述</label>
                        <textarea name="description" class="form-control" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">创建</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editCourseModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑课程</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="edit-alert"></div>
                <form id="edit-course-form">
                    <input type="hidden" name="course_id" id="edit-course-id">
                    <div class="mb-3">
                        <label class="form-label">课程名称</label>
                        <input type="text" name="name" id="edit-course-name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">课程描述</label>
                        <textarea name="description" id="edit-course-desc" class="form-control" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">保存</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endif %}
{% endblock %}

{% block extra_scripts %}
<script>
let showArchived = false;

function toggleArchived() {
    showArchived = !showArchived;
    document.getElementById('course-section-active').classList.toggle('d-none', showArchived);
    document.getElementById('course-section-archived').classList.toggle('d-none', !showArchived);
    const btn = document.getElementById('show-archived-btn');
    btn.classList.toggle('btn-outline-secondary', !showArchived);
    btn.classList.toggle('btn-secondary', showArchived);
    if (showArchived) loadArchivedCourses();
}

async function loadCourses() {
    try {
        const resp = await fetch('/api/courses?status=active');
        if (resp.ok) {
            const courses = await resp.json();
            renderCourses(courses, 'course-list');
        }
    } catch (err) {
        console.error('Failed to load courses:', err);
    }
}

async function loadArchivedCourses() {
    try {
        const resp = await fetch('/api/courses?status=archived');
        if (resp.ok) {
            const courses = await resp.json();
            renderCourses(courses, 'archived-course-list');
        }
    } catch (err) {
        console.error('Failed to load archived courses:', err);
    }
}

function renderCourses(courses, containerId) {
    const container = document.getElementById(containerId);
    if (courses.length === 0) {
        container.innerHTML = '<div class="col-12 text-center text-muted py-5"><i class="bi bi-journal-text" style="font-size: 3rem;"></i><p class="mt-2">暂无课程</p></div>';
    } else {
        {% if user.role == 'teacher' %}
        container.innerHTML = courses.map(function(c) {
            var nameEsc = c.name.replace(/'/g, "\\'");
            var descEsc = (c.description || '').replace(/'/g, "\\'");
            return '<div class="col-md-4"><div class="card course-card h-100 border-0 shadow-sm"><div class="card-body d-flex flex-column"><a href="/courses/' + c.id + '" class="text-decoration-none flex-grow-1"><h5 class="card-title fw-bold text-dark">' + c.name + '</h5><p class="card-text text-muted small">' + (c.description || '暂无描述') + '</p><div class="d-flex justify-content-between align-items-center mt-2"><span class="badge bg-light text-primary">' + (c.student_count || 0) + ' 名学生</span><small class="text-muted">' + (c.created_at ? new Date(c.created_at).toLocaleDateString() : '') + '</small></div></a><div class="mt-3 pt-2 border-top d-flex justify-content-between"><button class="btn btn-sm btn-outline-primary" onclick="editCourse(' + c.id + ', \'' + nameEsc + '\', \'' + descEsc + '\')"><i class="bi bi-pencil"></i></button><button class="btn btn-sm btn-outline-warning" onclick="toggleArchive(' + c.id + ', \'' + c.status + '\')"><i class="bi bi-' + (c.status === 'archived' ? 'archive-fill' : 'archive') + '"></i></button><button class="btn btn-sm btn-outline-danger" onclick="deleteCourse(' + c.id + ')"><i class="bi bi-trash"></i></button></div></div></div></div>';
        }).join('');
        {% else %}
        container.innerHTML = courses.map(function(c) {
            return '<div class="col-md-4"><a href="/courses/' + c.id + '" class="text-decoration-none"><div class="card course-card h-100 border-0 shadow-sm"><div class="card-body"><h5 class="card-title fw-bold text-dark">' + c.name + '</h5><p class="card-text text-muted small">' + (c.description || '暂无描述') + '</p><div class="d-flex justify-content-between align-items-center mt-3"><span class="badge bg-light text-info"><i class="bi bi-person me-1"></i>' + (c.teacher_name || '未知') + '</span><small class="text-muted">' + (c.created_at ? new Date(c.created_at).toLocaleDateString() : '') + '</small></div></div></div></a></div>';
        }).join('');
        {% endif %}
    }
}

{% if user.role == 'teacher' %}
function editCourse(id, name, desc) {
    document.getElementById('edit-course-id').value = id;
    document.getElementById('edit-course-name').value = name;
    document.getElementById('edit-course-desc').value = desc;
    document.getElementById('edit-alert').innerHTML = '';
    new bootstrap.Modal(document.getElementById('editCourseModal')).show();
}

async function toggleArchive(courseId, currentStatus) {
    var action = currentStatus === 'archived' ? 'unarchive' : 'archive';
    var label = currentStatus === 'archived' ? '恢复' : '归档';
    if (!confirm('确定' + label + '该课程？')) return;
    try {
        var resp = await fetch('/api/courses/' + courseId + '/' + action, { method: 'POST' });
        if (resp.ok) {
            loadCourses();
            if (showArchived) loadArchivedCourses();
        } else {
            var err = await resp.json();
            alert(err.detail || '操作失败');
        }
    } catch (e) {
        alert('网络错误');
    }
}

async function deleteCourse(courseId) {
    if (!confirm('确定删除该课程？此操作不可撤销。')) return;
    try {
        var resp = await fetch('/api/courses/' + courseId, { method: 'DELETE' });
        if (resp.ok) {
            loadCourses();
            if (showArchived) loadArchivedCourses();
        } else {
            var err = await resp.json();
            alert(err.detail || '删除失败');
        }
    } catch (e) {
        alert('网络错误');
    }
}
{% endif %}

document.addEventListener('DOMContentLoaded', loadCourses);

var createForm = document.getElementById('create-course-form');
if (createForm) {
    createForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        var form = new FormData(this);
        var data = { name: form.get('name'), description: form.get('description') || '' };
        try {
            var resp = await fetch('/api/courses', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
            });
            if (resp.ok) {
                var modal = bootstrap.Modal.getInstance(document.getElementById('createCourseModal'));
                modal.hide(); this.reset(); loadCourses();
            } else {
                var err = await resp.json();
                document.getElementById('create-alert').innerHTML = '<div class="alert alert-danger">' + (err.detail || '创建失败') + '</div>';
            }
        } catch (err) {
            document.getElementById('create-alert').innerHTML = '<div class="alert alert-danger">网络错误</div>';
        }
    });
}

var editForm = document.getElementById('edit-course-form');
if (editForm) {
    editForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        var courseId = document.getElementById('edit-course-id').value;
        var data = { name: document.getElementById('edit-course-name').value, description: document.getElementById('edit-course-desc').value || '' };
        try {
            var resp = await fetch('/api/courses/' + courseId, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
            });
            if (resp.ok) {
                var modal = bootstrap.Modal.getInstance(document.getElementById('editCourseModal'));
                modal.hide(); loadCourses(); if (showArchived) loadArchivedCourses();
            } else {
                var err = await resp.json();
                document.getElementById('edit-alert').innerHTML = '<div class="alert alert-danger">' + (err.detail || '保存失败') + '</div>';
            }
        } catch (err) {
            document.getElementById('edit-alert').innerHTML = '<div class="alert alert-danger">网络错误</div>';
        }
    });
}
</script>
{% endblock %}
