{% extends "base.html" %}
{% block title %}学习群聊{% endblock %}
{% block extra_head %}
<link href="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/styles/github.min.css" rel="stylesheet">
<style>
.chat-layout { display: flex; height: calc(100vh - 100px); gap: 0; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); background: #fff; }
.chat-sidebar { width: 240px; flex-shrink: 0; background: #f8f9fa; border-right: 1px solid #e9ecef; display: flex; flex-direction: column; }
.chat-sidebar-header { padding: 16px; border-bottom: 1px solid #e9ecef; font-weight: 600; font-size: 0.95rem; color: #333; }
.chat-sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
.participant-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; cursor: default; transition: background 0.15s; }
.participant-item:hover { background: #e9ecef; }
.participant-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.85rem; font-weight: 600; flex-shrink: 0; position: relative; }
.participant-avatar.gold-border { box-shadow: 0 0 0 2px #FFD700; }
.online-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; border: 2px solid #f8f9fa; position: absolute; bottom: -2px; right: -2px; }
.participant-info { min-width: 0; flex: 1; }
.participant-name { font-size: 0.85rem; font-weight: 500; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.participant-role { font-size: 0.72rem; color: #888; }
.chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.chat-header { padding: 12px 20px; border-bottom: 1px solid #e9ecef; background: #fff; display: flex; align-items: center; justify-content: space-between; }
.chat-header-title { font-weight: 600; font-size: 1rem; }
.chat-header-actions { display: flex; gap: 8px; }
.chat-messages { flex: 1; overflow-y: auto; padding: 20px; background: #f8fafc; display: flex; flex-direction: column; gap: 16px; }
.message-wrapper { display: flex; gap: 10px; max-width: 80%; }
.message-wrapper.self { align-self: flex-end; flex-direction: row-reverse; }
.message-wrapper.other { align-self: flex-start; }
.message-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.75rem; font-weight: 600; flex-shrink: 0; margin-top: 4px; }
.message-content { min-width: 0; }
.message-meta { font-size: 0.72rem; color: #999; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.message-bubble { padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; line-height: 1.6; word-wrap: break-word; white-space: pre-wrap; }
.message-wrapper.self .message-bubble { background: #1a56db; color: #fff; border-bottom-right-radius: 4px; }
.message-wrapper.other .message-bubble { background: #fff; color: #333; border: 1px solid #e9ecef; border-bottom-left-radius: 4px; }
.message-wrapper.other .message-bubble.gold-border { border-color: #FFD700; box-shadow: 0 0 0 1px #FFD700; }
.message-bubble p { margin-bottom: 4px; }
.message-bubble p:last-child { margin-bottom: 0; }
.message-bubble pre { border-radius: 6px; padding: 8px; font-size: 0.8rem; overflow-x: auto; background: #f5f5f5; }
.message-bubble code { font-size: 0.8rem; }
.message-wrapper.self .message-bubble code { color: #333; background: rgba(255,255,255,0.9); }
.typing-indicator { display: flex; align-items: center; gap: 10px; padding: 8px 0; align-self: flex-start; }
.typing-dots { display: flex; gap: 4px; }
.typing-dots span { width: 8px; height: 8px; border-radius: 50%; background: #ccc; animation: typing 1.4s infinite ease-in-out; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); } 30% { opacity: 1; transform: scale(1); } }
.chat-input-area { padding: 12px 20px; border-top: 1px solid #e9ecef; background: #fff; }
.chat-input-row { display: flex; gap: 10px; align-items: flex-end; }
.chat-input { flex: 1; border: 1px solid #e0e0e0; border-radius: 10px; padding: 10px 14px; font-size: 0.9rem; resize: none; max-height: 120px; outline: none; line-height: 1.5; }
.chat-input:focus { border-color: #1a56db; box-shadow: 0 0 0 2px rgba(26,86,219,0.1); }
.send-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: #1a56db; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.15s; flex-shrink: 0; }
.send-btn:hover { background: #1e40af; }
.send-btn:disabled { background: #ccc; cursor: not-allowed; }
.send-btn i { font-size: 1.1rem; }
.load-more { text-align: center; padding: 8px; }
.load-more-btn { border: none; background: transparent; color: #1a56db; font-size: 0.85rem; cursor: pointer; padding: 4px 12px; border-radius: 6px; }
.load-more-btn:hover { background: #f0f4ff; }
.status-message { text-align: center; color: #999; font-size: 0.8rem; padding: 4px 0; }
.system-message { text-align: center; color: #888; font-size: 0.8rem; padding: 8px 0; }
.system-message i { margin-right: 4px; }
</style>
{% endblock %}

{% block content %}
<div class="chat-layout">
    <div class="chat-sidebar">
        <div class="chat-sidebar-header">
            <i class="bi bi-people-fill me-2"></i>参与者
        </div>
        <div class="chat-sidebar-list" id="participantList"></div>
    </div>
    <div class="chat-main">
        <div class="chat-header">
            <div class="chat-header-title">
                <i class="bi bi-chat-dots me-2"></i><span id="courseName">学习群聊</span>
            </div>
            <div class="chat-header-actions">
                <a href="/courses/{{ course_id }}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>返回
                </a>
            </div>
        </div>
        <div class="chat-messages" id="messageArea">
            <div class="load-more" id="loadMoreWrap" style="display:none">
                <button class="load-more-btn" onclick="loadHistory()">
                    <i class="bi bi-arrow-up-circle me-1"></i>加载更多消息
                </button>
            </div>
        </div>
        <div class="chat-input-area">
            <div class="chat-input-row">
                <textarea class="chat-input" id="msgInput" rows="1" placeholder="输入消息... (Enter发送, Shift+Enter换行)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <i class="bi bi-send-fill"></i>
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="https://cdn.bootcdn.net/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
var courseId = {{ course_id }};
var currentUserId = {{ user.id }};
var participants = [];
var messageArea = document.getElementById('messageArea');
var msgInput = document.getElementById('msgInput');
var sendBtn = document.getElementById('sendBtn');
var isLoading = false;
var hasMore = true;
var oldestId = null;
var eventSource = null;

marked.setOptions({
    breaks: true,
    gfm: true,
    highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
            try { return hljs.highlight(code, {language: lang}).value; } catch(e) {}
        }
        return code;
    }
});

async function loadParticipants() {
    try {
        var resp = await fetch('/api/chat/participants/' + courseId);
        if (resp.ok) {
            var data = await resp.json();
            participants = data.participants || [];
            renderParticipants();
        }
    } catch(e) {}
}

function getParticipantColor(type, id) {
    if (type === 'ai_teacher') return '#FFD700';
    var p = participants.find(function(x) { return x.type === type && x.id === id; });
    return p ? p.color : '#666';
}

function getParticipantName(type, id) {
    if (type === 'ai_teacher') return 'AI教师';
    if (type === 'student') return '我';
    var p = participants.find(function(x) { return x.type === type && x.id === id; });
    return p ? p.name : '未知';
}

function renderParticipants() {
    var list = document.getElementById('participantList');
    var html = '';
    html += '<div class="participant-item">' +
        '<div class="participant-avatar" style="background:#64748b">' +
            '<i class="bi bi-person" style="font-size:1rem"></i>' +
            '<span class="online-dot"></span>' +
        '</div>' +
        '<div class="participant-info">' +
            '<div class="participant-name">我</div>' +
            '<div class="participant-role">我</div>' +
        '</div>' +
    '</div>';
    participants.forEach(function(p) {
        var isTeacher = p.type === 'ai_teacher';
        var avatarClass = isTeacher ? 'participant-avatar gold-border' : 'participant-avatar';
        html += '<div class="participant-item">' +
            '<div class="' + avatarClass + '" style="background:' + p.color + '">' +
                '<span>' + (p.name.charAt(0) || '?') + '</span>' +
                '<span class="online-dot"></span>' +
            '</div>' +
            '<div class="participant-info">' +
                '<div class="participant-name">' + p.name + '</div>' +
                '<div class="participant-role">' + (isTeacher ? 'AI教师' : 'AI学生') + '</div>' +
            '</div>' +
        '</div>';
    });
    list.innerHTML = html;
}

function renderMessage(msg) {
    var isSelf = msg.speaker_type === 'student';
    var wrapper = document.createElement('div');
    wrapper.className = 'message-wrapper' + (isSelf ? ' self' : ' other');

    var color = isSelf ? '#64748b' : getParticipantColor(msg.speaker_type, msg.speaker_id);
    var name = msg.speaker_name || getParticipantName(msg.speaker_type, msg.speaker_id);
    var isTeacher = msg.speaker_type === 'ai_teacher';

    var bubbleClass = 'message-bubble';
    if (isTeacher) bubbleClass += ' gold-border';
    if (isSelf) bubbleClass += ' self-bubble';

    var renderedContent = msg.content;
    if (!isSelf) {
        try { renderedContent = marked.parse(msg.content); } catch(e) {}
    }

    wrapper.innerHTML =
        '<div class="message-avatar" style="background:' + color + '">' +
            (isSelf ? '<i class="bi bi-person" style="font-size:0.85rem"></i>' : '<span>' + (name.charAt(0) || '?') + '</span>') +
        '</div>' +
        '<div class="message-content">' +
            '<div class="message-meta">' +
                '<span>' + name + '</span>' +
                '<span>' + (msg.created_at ? new Date(msg.created_at).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) : '') + '</span>' +
            '</div>' +
            '<div class="' + bubbleClass + '">' + (isSelf ? escapeHtml(msg.content) : renderedContent) + '</div>' +
        '</div>';

    return wrapper;
}

function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

var pendingBubble = null;
var pendingWrapper = null;

function createPendingTeacherBubble() {
    pendingWrapper = document.createElement('div');
    pendingWrapper.className = 'message-wrapper other';
    pendingWrapper.innerHTML =
        '<div class="message-avatar" style="background:#FFD700">教</div>' +
        '<div class="message-content">' +
            '<div class="message-meta"><span>AI教师</span><span>' + new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) + '</span></div>' +
            '<div class="message-bubble gold-border" id="pendingBubble"></div>' +
        '</div>';
    messageArea.appendChild(pendingWrapper);
    pendingBubble = document.getElementById('pendingBubble');
    scrollToBottom();
}

function appendTokenToPending(text) {
    if (!pendingBubble) return;
    pendingBubble.innerHTML += text;
    scrollToBottom();
}

function finalizePendingBubble() {
    if (pendingBubble && pendingBubble.innerHTML) {
        try { pendingBubble.innerHTML = marked.parse(pendingBubble.innerHTML); } catch(e) {}
    }
    pendingBubble = null;
    pendingWrapper = null;
}

function showTypingIndicator(studentType, studentName) {
    var indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.id = 'typing-' + studentType;
    var color = getParticipantColor('ai_student', studentType);
    indicator.innerHTML =
        '<div class="message-avatar" style="background:' + color + ';width:28px;height:28px;font-size:0.7rem">' + (studentName.charAt(0) || '?') + '</div>' +
        '<div class="typing-dots"><span></span><span></span><span></span></div>' +
        '<span style="font-size:0.75rem;color:#999">' + studentName + ' 正在输入...</span>';
    messageArea.appendChild(indicator);
    scrollToBottom();
}

function removeTypingIndicator(studentType) {
    var el = document.getElementById('typing-' + studentType);
    if (el) el.remove();
}

function addStudentBubble(studentType, studentName, content) {
    var wrapper = document.createElement('div');
    wrapper.className = 'message-wrapper other';
    var color = getParticipantColor('ai_student', studentType);
    var rendered = '';
    try { rendered = marked.parse(content); } catch(e) { rendered = content; }
    wrapper.innerHTML =
        '<div class="message-avatar" style="background:' + color + '">' + (studentName.charAt(0) || '?') + '</div>' +
        '<div class="message-content">' +
            '<div class="message-meta"><span>' + studentName + '</span><span>' + new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) + '</span></div>' +
            '<div class="message-bubble">' + rendered + '</div>' +
        '</div>';
    messageArea.appendChild(wrapper);
    scrollToBottom();
}

function addSystemMessage(text) {
    var div = document.createElement('div');
    div.className = 'system-message';
    div.innerHTML = '<i class="bi bi-info-circle"></i>' + text;
    messageArea.appendChild(div);
    scrollToBottom();
}

function scrollToBottom() {
    messageArea.scrollTop = messageArea.scrollHeight;
}

async function loadHistory() {
    if (isLoading || !hasMore) return;
    isLoading = true;
    var url = '/api/chat/history/' + courseId + '?limit=30';
    if (oldestId) url += '&before_id=' + oldestId;
    try {
        var resp = await fetch(url);
        if (resp.ok) {
            var msgs = await resp.json();
            if (msgs.length < 30) hasMore = false;
            var loadMoreWrap = document.getElementById('loadMoreWrap');
            var scrollTarget = null;

            msgs.forEach(function(msg) {
                var el = renderMessage(msg);
                if (loadMoreWrap.nextSibling) {
                    messageArea.insertBefore(el, loadMoreWrap.nextSibling);
                } else {
                    messageArea.appendChild(el);
                }
                if (!scrollTarget) scrollTarget = el;
            });

            if (msgs.length > 0) {
                oldestId = msgs[0].id;
            }

            if (scrollTarget) {
                scrollTarget.scrollIntoView({block: 'start'});
            }

            if (!hasMore) {
                loadMoreWrap.style.display = 'none';
            } else if (msgs.length > 0) {
                loadMoreWrap.style.display = 'block';
            }
        }
    } catch(e) {}
    isLoading = false;
}

async function sendMessage() {
    var text = msgInput.value.trim();
    if (!text) return;

    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendBtn.disabled = true;
    msgInput.disabled = true;

    var msg = {
        speaker_type: 'student',
        speaker_id: currentUserId,
        speaker_name: '我',
        content: text,
        created_at: new Date().toISOString()
    };
    messageArea.appendChild(renderMessage(msg));
    scrollToBottom();

    createPendingTeacherBubble();

    var url = '/api/chat/stream/' + courseId + '?message=' + encodeURIComponent(text);
    eventSource = new EventSource(url);

    eventSource.onmessage = function(e) {
        if (e.data === '[DONE]') {
            finalizePendingBubble();
            eventSource.close();
            eventSource = null;
            sendBtn.disabled = false;
            msgInput.disabled = false;
            msgInput.focus();
            return;
        }
        try {
            var data = JSON.parse(e.data);
            if (data.type === 'token') {
                appendTokenToPending(data.content);
            } else if (data.type === 'student_typing') {
                showTypingIndicator(data.student_type, data.student_name);
            } else if (data.type === 'student_token') {
                removeTypingIndicator(data.student_type);
                addStudentBubble(data.student_type, data.student_name, data.content);
            } else if (data.type === 'status') {
                // Status message handling could be added here
            } else if (data.type === 'error') {
                addSystemMessage('错误: ' + data.message);
                finalizePendingBubble();
                eventSource.close();
                eventSource = null;
                sendBtn.disabled = false;
                msgInput.disabled = false;
            }
        } catch(e) {}
    };

    eventSource.onerror = function() {
        if (eventSource) {
            eventSource.close();
            eventSource = null;
        }
        addSystemMessage('连接断开，请重试');
        finalizePendingBubble();
        sendBtn.disabled = false;
        msgInput.disabled = false;
    };
}

msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

msgInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

async function init() {
    await loadParticipants();
    await loadHistory();
    msgInput.focus();
}

init();
</script>
{% endblock %}
