{% extends "base.html" %}
{% block title %}题库练习{% endblock %}
{% block content %}
<div class="mb-3">
    <a href="/courses/{{ course_id }}" class="text-decoration-none text-muted small">
        <i class="bi bi-arrow-left me-1"></i>返回课程
    </a>
</div>

<h5 class="fw-bold mb-3"><i class="bi bi-question-circle me-2"></i>题库练习</h5>

{% if user.role == 'teacher' %}
<div class="card shadow-sm border-0 mb-4">
    <div class="card-body">
        <h6 class="fw-bold mb-3"><i class="bi bi-plus-circle me-2"></i>生成新练习</h6>
        <form id="generate-form">
            <div class="row g-2 mb-2">
                <div class="col-md-4">
                    <input type="text" name="title" class="form-control" placeholder="练习标题" value="{{ course_name }} 练习">
                </div>
                <div class="col-md-3">
                    <select name="num_questions" class="form-select">
                        <option value="5">5 题</option>
                        <option value="10">10 题</option>
                        <option value="15">15 题</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select name="difficulty" class="form-select">
                        <option value="mixed">混合难度</option>
                        <option value="easy">简单</option>
                        <option value="medium">中等</option>
                        <option value="hard">困难</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-magic me-1"></i>生成
                    </button>
                </div>
            </div>
        </form>
        <div id="gen-alert"></div>
    </div>
</div>
{% endif %}

<div id="quiz-list">
    <div class="text-center py-4 text-muted">
        <div class="spinner-border spinner-border-sm me-1"></div>加载练习列表...
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
async function loadQuizzes() {
    try {
        const resp = await fetch('/api/quiz/list/{{ course_id }}');
        const quizzes = await resp.json();
        const container = document.getElementById('quiz-list');
        if (quizzes.length === 0) {
            container.innerHTML = '<div class="text-center py-5 text-muted"><i class="bi bi-inbox" style="font-size:2rem"></i><p class="mt-2">暂无练习</p></div>';
            return;
        }
        container.innerHTML = quizzes.map(q => `
            <a href="/quiz/${q.id}" class="text-decoration-none">
                <div class="card shadow-sm border-0 mb-2">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-0 fw-bold">${q.title}</h6>
                            <small class="text-muted">${q.question_count} 题 · ${new Date(q.created_at).toLocaleDateString()}</small>
                        </div>
                        <i class="bi bi-chevron-right text-primary"></i>
                    </div>
                </div>
            </a>
        `).join('');
    } catch (e) {
        document.getElementById('quiz-list').innerHTML = '<div class="alert alert-danger">加载失败</div>';
    }
}

const genForm = document.getElementById('generate-form');
if (genForm) {
    genForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        const form = new FormData(this);
        const data = {
            title: form.get('title'),
            num_questions: parseInt(form.get('num_questions')),
            difficulty: form.get('difficulty'),
        };
        const btn = this.querySelector('button');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>生成中...';

        try {
            const resp = await fetch('/api/quiz/generate/{{ course_id }}', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data),
            });
            if (resp.ok) {
                const quiz = await resp.json();
                window.location.href = `/quiz/${quiz.id}`;
            } else {
                const err = await resp.json();
                document.getElementById('gen-alert').innerHTML = `<div class="alert alert-danger mt-2">${err.detail || '生成失败'}</div>`;
            }
        } catch (e) {
            document.getElementById('gen-alert').innerHTML = '<div class="alert alert-danger mt-2">网络错误</div>';
        }
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-magic me-1"></i>生成';
    });
}

document.addEventListener('DOMContentLoaded', loadQuizzes);
</script>
{% endblock %}
